<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parroquia Nuestra Señora de las Nieves - Noticias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { arena: '#F3E5DC', celesteLasNieves: '#0EA5E9', negro: '#000000' } } } }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #F3E5DC; color: #000000; font-family: sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        main { flex-grow: 1; }
        h1, h2, h3, h4, h5, h6 { color: #0EA5E9; font-weight: bold; }
        .btn-flotante-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .btn-flotante { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s; text-decoration: none; font-size: 24px; }
        .btn-flotante:hover { transform: scale(1.1); color: white; }
        .btn-subir { background-color: #0EA5E9; cursor: pointer; border: none; }
        .btn-whatsapp { background-color: #25D366; }
        .card { background: white; border-radius: 0.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 1.5rem; height: 100%; }
        .nav-link { color: white; padding: 0.5rem 1rem; border-radius: 0.25rem; }
        .nav-link:hover, .nav-link.active { background-color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
<div id="menu-container"></div>

<main class="container mx-auto px-4 py-8 space-y-16">
    <section id="noticias">
        <h2 class="text-3xl mb-8 text-center">Portal de Noticias</h2>
        <div id="noticias-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Se llenará con JS -->
        </div>
    </section>
</main>

<div id="footer-container"></div>
<script src="../components.js?v=2"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        Promise.all([
            fetch("../noticias.json?v=" + new Date().getTime()).then(res => res.ok ? res.json() : []).catch(() => []),
            fetch("../assets/flyers/")
                .then(res => res.ok ? res.text() : "")
                .then(async html => {
                    const regex = /href="([^"]*?\.(?:jpg|jpeg|png|gif|webp))"/gi;
                    let flyers = [];
                    let match;
                    while ((match = regex.exec(html)) !== null) {
                    let filename = match[1].split('/').pop();
                    let decodedFilename = decodeURIComponent(filename);
                    let baseName = decodedFilename.replace(/\.[^/.]+$/, "");
                    let title = baseName.replace(/[-_]/g, " ").toUpperCase();
                    let safeId = "flyer-" + baseName.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
                    flyers.push({
                        id: safeId,
                        title: title,
                        description: "Revisa la información en el afiche adjunto para más detalles.",
                        date: new Date().toLocaleDateString('es-CL'),
                        imageUrl: "assets/flyers/" + decodedFilename,
                        isFlyer: true
                    });
                    }
                    
                    if (flyers.length === 0 && window.location.hostname !== '127.0.0.1' && window.location.hostname !== 'localhost') {
                        try {
                            const apiRes = await fetch("https://api.github.com/repos/rodrigoquezadab/LasNieves/contents/assets/flyers");
                            if (apiRes.ok) {
                                const files = await apiRes.json();
                                files.forEach(file => {
                                    if (file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                                        let decodedFilename = decodeURIComponent(file.name);
                                        let baseName = decodedFilename.replace(/\.[^/.]+$/, "");
                                        let title = baseName.replace(/[-_]/g, " ").toUpperCase();
                                        let safeId = "flyer-" + baseName.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
                                        flyers.push({
                                            id: safeId,
                                            title: title,
                                            description: "Revisa la información en el afiche adjunto para más detalles.",
                                            date: new Date().toLocaleDateString('es-CL'),
                                            imageUrl: "assets/flyers/" + file.name,
                                            isFlyer: true
                                        });
                                    }
                                });
                            }
                        } catch (e) {
                            console.error("Error cargando desde GitHub API", e);
                        }
                    }
                    
                    return flyers.filter((v,i,a)=>a.findIndex(t=>(t.imageUrl === v.imageUrl))===i);
                })
                .catch(() => [])
        ])
            .then(([newsData, flyersData]) => {
                const allNews = flyersData.concat(newsData);
                const gridContainer = document.getElementById("noticias-grid");
                let gridHTML = "";
                allNews.forEach(n => {
                    gridHTML += `
                        <div class="card flex flex-col cursor-pointer hover:shadow-xl transition" onclick="window.location.href='noticia.html?id=${n.id}'">
                            <img src="../${n.imageUrl}" alt="${n.title}" class="w-full h-64 object-contain rounded-t-lg mb-4 bg-gray-100">
                            <h3 class="text-xl font-bold mb-2 flex-grow">${n.title}</h3>
                            <p class="text-gray-600 line-clamp-3">${n.description}</p>
                            <p class="text-sm font-bold text-celesteLasNieves mt-3">${n.date}</p>
                        </div>
                    `;
                });
                gridContainer.innerHTML = gridHTML;
            })
            .catch(error => {
                console.error("Error cargando noticias:", error);
                document.getElementById('noticias-grid').innerHTML = '<p class="text-center col-span-3 text-red-500">Error al cargar las noticias.</p>';
            });
    });
</script>
</body>
</html>

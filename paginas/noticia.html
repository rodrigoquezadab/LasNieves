<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parroquia Nuestra Señora de las Nieves - Noticia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { arena: '#F3E5DC', celesteLasNieves: '#0EA5E9', negro: '#000000' } } } }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #F3E5DC; color: #000000; font-family: sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        main { flex-grow: 1; }
        h1, h2, h3, h4, h5, h6 { color: #0EA5E9; font-weight: bold; }
        .btn-flotante-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .btn-flotante { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s; text-decoration: none; font-size: 24px; }
        .btn-flotante:hover { transform: scale(1.1); color: white; }
        .btn-subir { background-color: #0EA5E9; cursor: pointer; border: none; }
        .btn-whatsapp { background-color: #25D366; }
        .card { background: white; border-radius: 0.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 1.5rem; height: 100%; }
        .nav-link { color: white; padding: 0.5rem 1rem; border-radius: 0.25rem; }
        .nav-link:hover, .nav-link.active { background-color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
<div id="menu-container"></div>

<main class="container mx-auto px-4 py-8 space-y-8" id="noticia-container">
    <div class="text-center py-20">
        <i class="fas fa-spinner fa-spin fa-3x text-celesteLasNieves mb-4"></i>
        <p class="text-lg">Cargando noticia...</p>
    </div>
</main>

<div id="footer-container"></div>
<script src="../components.js?v=2"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        if (!articleId) {
            document.getElementById('noticia-container').innerHTML = '<div class="text-center text-red-500 py-20"><h2 class="text-3xl font-bold mb-4">Error</h2><p class="text-lg">No se ha especificado ninguna noticia para mostrar.</p><a href="noticias.html" class="inline-block bg-celesteLasNieves text-white px-6 py-2 rounded-lg mt-6 hover:bg-sky-600 transition">Volver a Noticias</a></div>';
            return;
        }

        Promise.all([
            fetch("../noticias.json?v=" + new Date().getTime()).then(res => res.ok ? res.json() : []).catch(() => []),
            fetch("../assets/flyers/")
                .then(res => res.ok ? res.text() : "")
                .then(async html => {
                    const regex = /href="([^"]*?\.(?:jpg|jpeg|png|gif|webp))"/gi;
                    let flyers = [];
                    let match;
                    while ((match = regex.exec(html)) !== null) {
                    let filename = match[1].split('/').pop();
                    let decodedFilename = decodeURIComponent(filename);
                    let baseName = decodedFilename.replace(/\.[^/.]+$/, "");
                    let title = baseName.replace(/[-_]/g, " ").toUpperCase();
                    let safeId = "flyer-" + baseName.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
                    flyers.push({
                        id: safeId,
                        title: title,
                        description: "Revisa el afiche adjunto para más información.",
                        date: new Date().toLocaleDateString('es-CL'),
                        imageUrl: "assets/flyers/" + decodedFilename,
                        isFlyer: true
                    });
                    }
                    
                    if (flyers.length === 0 && window.location.hostname !== '127.0.0.1' && window.location.hostname !== 'localhost') {
                        try {
                            const apiRes = await fetch("https://api.github.com/repos/rodrigoquezadab/LasNieves/contents/assets/flyers");
                            if (apiRes.ok) {
                                const files = await apiRes.json();
                                files.forEach(file => {
                                    if (file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                                        let decodedFilename = decodeURIComponent(file.name);
                                        let baseName = decodedFilename.replace(/\.[^/.]+$/, "");
                                        let title = baseName.replace(/[-_]/g, " ").toUpperCase();
                                        let safeId = "flyer-" + baseName.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
                                        flyers.push({
                                            id: safeId,
                                            title: title,
                                            description: "Revisa el afiche adjunto para más información.",
                                            date: new Date().toLocaleDateString('es-CL'),
                                            imageUrl: "assets/flyers/" + file.name,
                                            isFlyer: true
                                        });
                                    }
                                });
                            }
                        } catch (e) {
                            console.error("Error cargando desde GitHub API", e);
                        }
                    }
                    
                    return flyers.filter((v,i,a)=>a.findIndex(t=>(t.imageUrl === v.imageUrl))===i);
                })
                .catch(() => [])
        ])
            .then(([newsData, flyersData]) => {
                const allNews = flyersData.concat(newsData);
                const article = allNews.find(n => n.id === articleId);
                
                if (article) {
                    document.title = "Parroquia Nuestra Señora de las Nieves - " + article.title;
                    const content = article.content ? article.content : `<p class="whitespace-pre-line text-lg leading-relaxed">${article.description}</p>`;
                    
                    document.getElementById('noticia-container').innerHTML = `
                        <article class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
                            <img src="../${article.imageUrl}" alt="${article.title}" class="w-full h-auto max-h-[500px] object-contain bg-gray-100">
                            <div class="p-6 md:p-10">
                                <h1 class="text-3xl md:text-5xl font-bold text-celesteLasNieves mb-6 leading-tight">${article.title}</h1>
                                <div class="flex items-center text-gray-500 mb-8 border-b pb-4">
                                    <i class="far fa-calendar-alt mr-2"></i> <span class="text-lg">${article.date}</span>
                                </div>
                                <div class="prose max-w-none text-gray-800">
                                    ${content}
                                </div>
                                <div class="mt-12 text-center md:text-left">
                                    <a href="noticias.html" class="inline-block bg-celesteLasNieves text-white px-6 py-3 rounded-lg hover:bg-sky-600 transition shadow-md"><i class="fas fa-arrow-left mr-2"></i>Volver a Noticias</a>
                                </div>
                            </div>
                        </article>
                    `;
                } else {
                    document.getElementById('noticia-container').innerHTML = '<div class="text-center text-red-500 py-20"><h2 class="text-3xl font-bold mb-4">Noticia no encontrada</h2><p class="text-lg">La noticia que buscas no existe o ha sido eliminada.</p><a href="noticias.html" class="inline-block bg-celesteLasNieves text-white px-6 py-2 rounded-lg mt-6 hover:bg-sky-600 transition">Volver a Noticias</a></div>';
                }
            })
            .catch(error => {
                console.error("Error cargando la noticia:", error);
                document.getElementById('noticia-container').innerHTML = '<div class="text-center text-red-500 py-20"><h2 class="text-3xl font-bold mb-4">Error de Conexión</h2><p class="text-lg">No se pudo cargar la base de datos de noticias.</p><a href="noticias.html" class="inline-block bg-celesteLasNieves text-white px-6 py-2 rounded-lg mt-6 hover:bg-sky-600 transition">Volver a Noticias</a></div>';
            });
    });
</script>
</body>
</html>
